services:

  postgres:
    image: postgres:16-alpine
    container_name: pokemon_postgres
    environment:
      POSTGRES_DB:       pokemon_db
      POSTGRES_USER:     pokemon_user
      POSTGRES_PASSWORD: pokemon_pass
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokemon_user -d pokemon_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pokemon_api:
    build: .
    container_name: pokemon_api
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       pokemon_db
      POSTGRES_USER:     pokemon_user
      POSTGRES_PASSWORD: pokemon_pass
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  pg_data:
